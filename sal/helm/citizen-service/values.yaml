# -- Number of replicas for the API pod
replicaCount: 2

api:
  image:
    # -- API container image repository
    repository: ghcr.io/united-states-of-mekniy-and-lurk/egov-suite-citizen-service-api
    # -- Image pull policy
    pullPolicy: Always
    # -- Image tag; defaults to the chart appVersion
    tag: "latest"

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  ingress:
    enabled: true
    # -- Ingress class name (e.g. nginx)
    className: ""
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    host: citizen-service.local
    tls: []
    #  - secretName: citizen-service-tls
    #    hosts:
    #      - citizen-service.local

  resources: {}
  #  requests:
  #    cpu: 100m
  #    memory: 128Mi
  #  limits:
  #    cpu: 500m
  #    memory: 256Mi

  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 10
    periodSeconds: 5

  podAnnotations: {}

web:
  # -- Number of replicas for the Web/admin pod
  replicaCount: 1

  image:
    # -- Web container image repository
    repository: ghcr.io/united-states-of-mekniy-and-lurk/egov-suite-citizen-service-web
    pullPolicy: Always
    tag: "latest"

  service:
    type: ClusterIP
    port: 80
    targetPort: 8080

  ingress:
    enabled: true
    className: ""
    annotations:
      nginx.ingress.kubernetes.io/rewrite-target: /
    host: citizen-admin.local
    tls: []
    #  - secretName: citizen-admin-tls
    #    hosts:
    #      - citizen-admin.local

  resources: {}

  podAnnotations: {}

# -- Configuration values rendered into the ConfigMap / environment
config:
  aspnetcoreEnvironment: "Production"
  # Use the canonical issuer URL reachable by end users/browsers.
  # Do not use a cluster-internal-only URI here when login happens in browser.
  jwtAuthority: "http://keycloak:8080/realms/sal"
  jwtAudience: "citizen-service"
  personRegistryBaseUrl: "http://person-registry"
  citizenApiBaseUrl: "http://citizen-service"
  # Must match the public OIDC issuer used by the browser (typically via your tunnel/domain).
  oidcAuthority: "http://keycloak:8080/realms/sal"
  oidcClientId: "citizen-admin"

# -- Secret values.
# These are stored in a Kubernetes Secret created by the chart.
# For production, prefer providing an existing secret via existingSecret
# and managing credentials with a secrets manager (e.g. Sealed Secrets, Vault).
secret:
  # -- Name of a pre-existing Secret to use instead of creating one.
  # When set, the chart will NOT create a Secret; the referenced secret must
  # contain the same keys as the stringData block below.
  existingSecret: ""

  # -- Secret values used when existingSecret is empty and the chart creates the Secret.
  # These values are base64-encoded by Kubernetes — do NOT commit real credentials here.
  # Override via --set or an encrypted values file (e.g. helm-secrets / Sealed Secrets).
  # Leave empty to auto-derive from postgresql.* when postgresql.enabled=true.
  connectionString: ""
  oidcClientSecret: "CHANGE_ME"

# -- In-cluster PostgreSQL settings. Set enabled=false to use external DB.
postgresql:
  enabled: true
  image: postgres:16-alpine
  database: citizenservice
  username: postgres
  storageSize: 5Gi
  password: "CHANGE_THIS_PASSWORD_BEFORE_DEPLOYING"
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "512Mi"
      cpu: "500m"

nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # -- Whether to create a ServiceAccount
  create: false
  name: ""
  annotations: {}
