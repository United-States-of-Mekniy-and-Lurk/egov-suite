{{- if .Values.web.dataProtection.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "citizen-service.fullname" . }}-web-keys-pvc
  labels:
    {{- include "citizen-service.labels" . | nindent 4 }}
    app.kubernetes.io/component: web
spec:
  accessModes:
    - {{ .Values.web.dataProtection.accessMode }}
  resources:
    requests:
      storage: {{ .Values.web.dataProtection.storageSize }}
{{- end }}