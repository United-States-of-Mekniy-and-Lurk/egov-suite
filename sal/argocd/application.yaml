apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: citizen-service
  namespace: argocd
  # Remove the finalizer if you want ArgoCD to skip cascade-delete on removal.
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default

  source:
    # -- Update repoURL to match your Git remote.
    repoURL: https://github.com/United-States-of-Mekniy-and-Lurk/egov-suite.git
    targetRevision: HEAD
    path: sal/helm/citizen-service
    helm:
      # -- Override individual values here or reference a values file.
      # In production, use a separate encrypted values file for secrets
      # (e.g. helm-secrets) or set secret.existingSecret to a Sealed Secret.
      valueFiles:
        - values.yaml
      # Example overrides — replace or remove as needed:
      # parameters:
      #   - name: api.image.tag
      #     value: "1.2.3"
      #   - name: secret.existingSecret
      #     value: citizen-service-sealed-secret

  destination:
    server: https://kubernetes.default.svc
    namespace: default

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
