# Argo CD Application manifest for the Ego Person Registry service.
#
# Prerequisites:
#   - Argo CD installed in the cluster (https://argo-cd.readthedocs.io)
#   - For secret management, one of:
#       a) External Secrets Operator (ESO) installed and a ClusterSecretStore configured.
#          Set externalSecrets.enabled=true and postgresql.externalSecrets.enabled=true in values.yaml,
#          then point the remoteRef keys at your secret backend (AWS Secrets Manager, Vault, GCP SM, etc.).
#       b) Argo CD Vault Plugin (argocd-vault-plugin) configured in argocd-cm and enabled here.
#       c) Pre-create the Secrets manually for bootstrap (not recommended for production).
#
# Apply to your Argo CD cluster:
#   kubectl apply -f argocd/application.yaml
#
# Argo CD will sync the Helm chart from the repository and deploy it to the ego namespace.
# The helm-release workflow bumps image.tag in helm/ego/values.yaml after each Docker push,
# triggering an automated Argo CD sync when auto-sync is enabled.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ego
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/United-States-of-Mekniy-and-Lurk/ego.git
    targetRevision: HEAD
    path: helm/ego
    helm:
      releaseName: ego
      # Override non-sensitive values here.
      # Sensitive values (connection strings, passwords) should come from externalSecrets or a vault plugin.
      values: |
        ingress:
          host: ego.example.com
        config:
          keycloak:
            authority: "https://keycloak.example.com/realms/mekniy-and-lurk"
            audience: "account"
        # Uncomment and configure to enable External Secrets Operator for secret management:
        # externalSecrets:
        #   enabled: true
        #   secretStoreRef:
        #     name: cluster-secret-store
        #     kind: ClusterSecretStore
        #   data:
        #     connectionString:
        #       remoteRef:
        #         key: "ego/api"
        #         property: "connection-string"
        # postgresql:
        #   externalSecrets:
        #     enabled: true
        #     secretStoreRef:
        #       name: cluster-secret-store
        #       kind: ClusterSecretStore
        #     remoteRef:
        #       key: "ego/postgres"
        #       property: "password"
  destination:
    server: https://kubernetes.default.svc
    namespace: ego
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
