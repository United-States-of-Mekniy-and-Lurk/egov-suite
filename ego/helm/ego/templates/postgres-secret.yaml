{{- if .Values.postgresql.enabled }}
{{- if not .Values.postgresql.externalSecrets.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ego.fullname" . }}-postgres-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ego.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
type: Opaque
stringData:
  POSTGRES_PASSWORD: {{ .Values.postgresql.password | quote }}
{{- else }}
# ExternalSecret pulls the PostgreSQL password from the configured secret store.
# Requires External Secrets Operator: https://external-secrets.io
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "ego.fullname" . }}-postgres-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ego.labels" . | nindent 4 }}
    app.kubernetes.io/component: postgresql
spec:
  refreshInterval: {{ .Values.postgresql.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.postgresql.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.postgresql.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "ego.fullname" . }}-postgres-secret
    creationPolicy: Owner
  data:
    - secretKey: POSTGRES_PASSWORD
      remoteRef:
        key: {{ .Values.postgresql.externalSecrets.remoteRef.key }}
        property: {{ .Values.postgresql.externalSecrets.remoteRef.property }}
{{- end }}
{{- end }}
