{{- if .Values.externalSecrets.enabled }}
# ExternalSecret pulls the API connection string from the configured secret store.
# Requires External Secrets Operator: https://external-secrets.io
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "ego.fullname" . }}-secret
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ego.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecrets.refreshInterval }}
  secretStoreRef:
    name: {{ .Values.externalSecrets.secretStoreRef.name }}
    kind: {{ .Values.externalSecrets.secretStoreRef.kind }}
  target:
    name: {{ include "ego.fullname" . }}-secret
    creationPolicy: Owner
  data:
    - secretKey: ConnectionStrings__DefaultConnection
      remoteRef:
        key: {{ .Values.externalSecrets.data.connectionString.remoteRef.key }}
        property: {{ .Values.externalSecrets.data.connectionString.remoteRef.property }}
{{- end }}
