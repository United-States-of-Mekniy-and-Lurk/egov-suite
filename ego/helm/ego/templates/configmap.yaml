apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "ego.fullname" . }}-config
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "ego.labels" . | nindent 4 }}
data:
  ASPNETCORE_ENVIRONMENT: {{ .Values.config.aspnetcoreEnvironment | quote }}
  Keycloak__Authority: {{ .Values.config.keycloak.authority | quote }}
  Keycloak__Audience: {{ .Values.config.keycloak.audience | quote }}
  Keycloak__RequireHttpsMetadata: {{ .Values.config.keycloak.requireHttpsMetadata | quote }}
