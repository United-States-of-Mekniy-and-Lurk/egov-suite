name: Containers

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    name: Build ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: ego
            context: ./ego
            dockerfile: ./ego/Dockerfile
            image: ghcr.io/united-states-of-mekniy-and-lurk/egov-suite-ego
          - name: citizen-service-api
            context: .
            dockerfile: ./sal/Dockerfile.api
            image: ghcr.io/united-states-of-mekniy-and-lurk/egov-suite-citizen-service-api
          - name: citizen-service-web
            context: .
            dockerfile: ./sal/Dockerfile.web
            image: ghcr.io/united-states-of-mekniy-and-lurk/egov-suite-citizen-service-web
          - name: gov-cli
            context: ./gov-cli
            dockerfile: ./gov-cli/Dockerfile
            image: ghcr.io/united-states-of-mekniy-and-lurk/egov-suite-gov-cli

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
