name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - 'copilot/**'

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
          - os: windows-latest
            rid: win-x64
          - os: macos-latest
            rid: osx-x64

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore gov-cli.slnx

      - name: Build
        run: dotnet build gov-cli.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test gov-cli.slnx --configuration Release --no-build --logger "trx;LogFileName=test-results.trx" --results-directory ./artifacts/test-results

      - name: Publish CLI
        run: dotnet publish Gov.Cli/Gov.Cli.csproj --configuration Release --no-build --runtime ${{ matrix.rid }} --self-contained false --output ./artifacts/publish/${{ matrix.rid }}

      - name: Upload test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./artifacts/test-results
          if-no-files-found: warn

      - name: Upload CLI artifacts
        uses: actions/upload-artifact@v4
        with:
          name: gov-cli-${{ matrix.rid }}
          path: ./artifacts/publish/${{ matrix.rid }}
          if-no-files-found: error
